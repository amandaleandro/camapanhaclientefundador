<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads | FechaPro</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f3f8fd;color:#10233e;font:14px Arial,sans-serif}.wrap{width:min(100% - 32px,1000px);margin:48px auto}.top{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:22px}h1{margin:0;color:#062b65}.btn{display:inline-block;padding:12px 16px;border-radius:7px;background:#075fe4;color:#fff;text-decoration:none;font-weight:700}.card{overflow:auto;border:1px solid #dce6f1;border-radius:10px;background:#fff;box-shadow:0 10px 25px rgba(11,55,105,.08)}table{width:100%;border-collapse:collapse;text-align:left}th,td{padding:15px;border-bottom:1px solid #e8eef5}th{color:#617089;font-size:11px;text-transform:uppercase}tr:last-child td{border:0}.empty{padding:30px;text-align:center;color:#617089}@media(max-width:600px){.top{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top"><div><h1>Cadastros FechaPro</h1><p id="count">Carregando...</p></div><a class="btn" href="/api/leads.csv">Exportar CSV</a></div>
    <div class="card"><table><thead><tr><th>Nome</th><th>WhatsApp</th><th>Cadastro</th></tr></thead><tbody id="rows"></tbody></table><div class="empty" id="empty" hidden>Nenhum cadastro recebido ainda.</div></div>
  </main>
  <script>
    fetch("/api/leads").then(response => response.json()).then(leads => {
      document.getElementById("count").textContent = `${leads.length} pessoa${leads.length === 1 ? "" : "s"} cadastrada${leads.length === 1 ? "" : "s"}`;
      document.getElementById("empty").hidden = leads.length > 0;
      document.getElementById("rows").innerHTML = leads.map(lead => `<tr><td>${escapeHtml(lead.nome)}</td><td>${phone(lead.whatsapp)}</td><td>${new Date(lead.createdAt).toLocaleString("pt-BR")}</td></tr>`).join("");
    });
    function escapeHtml(text){const div=document.createElement("div");div.textContent=text;return div.innerHTML}
    function phone(value){return value.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3")}
  </script>
</body>
</html>
